<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ד.ב.ר — תיק עובדתי</title>
  <style>
    :root{
      --bg:#f4f2ec;--ink:#18212f;--muted:#5f6673;--line:#ddd4c4;
      --blue:#1f5f8b;--blue-dark:#174867;--green:#28745f;--amber:#b6781f;
      --soft-blue:#e8f1f7;--soft-green:#e8f4ef;--soft-amber:#fbf0dc;
      --shadow:0 18px 45px rgba(28,36,50,.12);--radius:22px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.75}
    #loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:1.2rem}
    a{color:var(--blue)}
    /* ── Layout ── */
    .wrapper{display:grid;grid-template-columns:240px 1fr;gap:28px;
      width:min(1140px,calc(100% - 32px));margin:32px auto 64px;align-items:start}
    /* ── Sidebar ── */
    .sidebar{position:sticky;top:24px}
    .nav-block{background:white;border:1px solid var(--line);border-radius:20px;
      box-shadow:0 6px 22px rgba(28,36,50,.07);overflow:hidden}
    .nav-block header{padding:16px 18px;background:var(--soft-blue);
      border-bottom:1px solid var(--line);font-weight:800;color:var(--blue-dark);font-size:.95rem}
    .nav-block a{display:block;padding:11px 18px;color:#3d4654;text-decoration:none;
      font-size:.92rem;border-bottom:1px solid var(--line);transition:background .15s}
    .nav-block a:hover{background:var(--soft-blue)}
    .nav-block a:last-child{border-bottom:none}
    .nav-block .active{color:var(--blue-dark);font-weight:700;background:rgba(31,95,139,.07)}
    .meta-block{margin-top:16px;background:white;border:1px solid var(--line);
      border-radius:20px;padding:18px;box-shadow:0 6px 22px rgba(28,36,50,.07)}
    .meta-card{margin-bottom:14px}
    .meta-card span{display:block;font-size:.82rem;color:var(--muted);margin-bottom:2px}
    .meta-card strong{font-size:.93rem}
    .meta-card:last-child{margin-bottom:0}
    /* ── Main content ── */
    .main{min-width:0}
    /* ── Hero ── */
    .hero{background:linear-gradient(135deg,#1a3a52 0%,var(--blue-dark) 60%,#163e5c 100%);
      color:white;border-radius:var(--radius);padding:34px 36px 28px;
      box-shadow:0 22px 48px rgba(23,72,103,.32);margin-bottom:22px;position:relative;overflow:hidden}
    .hero::before{content:"";position:absolute;inset-inline-end:-60px;top:-70px;
      width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.07)}
    .hero-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;position:relative}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.2);
      display:grid;place-items:center;font-weight:900;font-size:.95rem}
    .stage-badge{background:rgba(255,255,255,.18);border-radius:999px;
      padding:6px 14px;font-size:.9rem;border:1px solid rgba(255,255,255,.25)}
    .hero h1{margin:0 0 8px;font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:900;position:relative}
    .hero .sub{font-size:1.05rem;opacity:.82;position:relative}
    .hero .credit{font-size:.76rem;opacity:.58;margin:7px 0 0;position:relative;font-weight:400}
    .footer .signature{margin-top:8px;font-weight:800;font-size:1rem;color:var(--ink);letter-spacing:.02em}
    /* ── Topbar (לוגו + חץ חזרה), בהשראת דף האם ── */
    .topbar{position:sticky;top:0;z-index:50;margin:0;display:flex;
      justify-content:space-between;align-items:center;gap:16px;
      padding:12px max(16px,calc((100% - 1140px)/2));
      background:rgba(244,242,236,.92);backdrop-filter:blur(6px);
      border-bottom:1px solid var(--line);box-shadow:0 2px 12px rgba(28,36,50,.06)}
    .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;
      color:var(--blue-dark);font-size:1.05rem;text-decoration:none;min-width:0}
    .topbar .brand span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .topbar .brand-mark{height:40px;padding:0 13px;border-radius:12px;
      background:linear-gradient(135deg,#1a3a52,var(--blue-dark));display:grid;place-items:center;
      color:#fff;font-size:.84rem;font-weight:900;letter-spacing:.06em;
      box-shadow:0 4px 14px rgba(23,72,103,.3);flex-shrink:0}
    .topbar .back-arrow{width:42px;height:42px;border-radius:12px;background:var(--blue);
      color:#fff;display:grid;place-items:center;font-size:1.3rem;text-decoration:none;
      box-shadow:0 4px 14px rgba(31,95,139,.28);transition:transform .15s;flex-shrink:0}
    .topbar .back-arrow:hover{transform:translateY(-2px)}
    /* ── תיבת תיק מקופלת (מטא-דאטה + זכויות) ── */
    .meta-fold{background:white;border:1px solid var(--line);border-radius:20px;
      padding:14px 18px;box-shadow:0 6px 22px rgba(28,36,50,.07)}
    .meta-fold>summary{cursor:pointer;list-style:none}
    .meta-fold>summary::-webkit-details-marker{display:none}
    .meta-sum{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .meta-sum .meta-title{font-weight:800;color:var(--blue-dark);font-size:.95rem}
    .meta-sum .meta-title::before{content:"▸ ";font-size:.75rem;color:var(--muted)}
    .meta-fold[open] .meta-sum .meta-title::before{content:"▾ "}
    .btn-disabled{background:#e6e9ee;color:#9aa2ad;border:1px solid #d7dbe2;border-radius:10px;
      padding:6px 12px;font-size:.82rem;font-weight:700;cursor:not-allowed;white-space:nowrap}
    .meta-fold .meta-block{margin-top:12px;padding:0;border:none;box-shadow:none;background:none}
    .meta-fold .site-copy{margin-top:12px;font-size:.72rem;color:var(--muted);direction:ltr}
    /* ── Insight cards ── */
    .insights{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px}
    .insight-card{border-radius:18px;padding:20px;border:1px solid}
    .insight-card.blue{background:var(--soft-blue);border-color:rgba(31,95,139,.2)}
    .insight-card.green{background:var(--soft-green);border-color:rgba(40,116,95,.2)}
    .insight-card.amber{background:var(--soft-amber);border-color:rgba(182,120,31,.22)}
    .insight-card h3{margin:0 0 8px;font-size:1.05rem}
    .insight-card.blue h3{color:var(--blue-dark)}
    /* ── הערות והסתייגויות (תחתית, אותיות קטנות) ── */
    .caveats{margin-top:26px;padding:14px 18px;border-top:1px dashed var(--line);
      color:var(--muted);font-size:.78rem;line-height:1.55}
    .caveats h4{margin:0 0 6px;font-size:.82rem;color:var(--muted);font-weight:700;
      text-transform:none;letter-spacing:.01em}
    .caveats p{margin:4px 0}
    .caveats strong{color:#7a818d}
    .dossier-fineprint{margin-top:26px;padding-top:14px;border-top:1px dashed var(--line);
      font-size:.78rem;color:var(--muted);line-height:1.55}
    .dossier-fineprint .fp-h{font-weight:700;color:#7a818d;margin:12px 0 4px;font-size:.82rem}
    .dossier-fineprint p{margin:4px 0}
    .dossier-fineprint .fp-date{margin-top:14px;font-style:italic;color:#8a909a}
    .dossier-fineprint details.fp-fold>summary{cursor:pointer;list-style:none;margin:12px 0 4px}
    .dossier-fineprint details.fp-fold>summary::-webkit-details-marker{display:none}
    .dossier-fineprint details.fp-fold>summary::before{content:"▸ ";font-size:.7rem}
    .dossier-fineprint details.fp-fold[open]>summary::before{content:"▾ "}
    .content details.fold{margin:4px 0 16px;border-top:1px solid var(--line);padding-top:4px}
    .content details.fold>summary{cursor:pointer;list-style:none;font-weight:800;
      font-size:1.15rem;color:var(--blue-dark);margin:8px 0;padding:2px 0}
    .content details.fold>summary::-webkit-details-marker{display:none}
    .content details.fold>summary::before{content:"▸ ";font-size:.8rem;color:var(--muted)}
    .content details.fold[open]>summary::before{content:"▾ "}
    /* ── שער-קוד לצוות (סעיפים 9+) ── */
    .gate{margin:22px 0;border:1px solid rgba(182,120,31,.3);border-radius:16px;
      background:var(--soft-amber);padding:18px 20px}
    .gate-head{font-weight:800;color:var(--amber);font-size:1.1rem;margin-bottom:6px}
    .gate-head span{font-weight:600;color:var(--muted);font-size:.85rem}
    .gate-note{margin:0 0 12px;font-size:.9rem;color:#4b3a20}
    .gate-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .gate-input{padding:9px 14px;border:1px solid var(--line);border-radius:10px;
      font-size:.95rem;min-width:140px;font-family:inherit}
    .gate-btn{padding:9px 20px;border:none;border-radius:10px;background:var(--blue);
      color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}
    .gate-btn:hover{background:var(--blue-dark)}
    .gate-err{margin-top:10px;color:#a02020;font-size:.88rem;font-weight:700}
    .gate-content{margin-top:14px}
    .insight-card.green h3{color:#1e5949}
    .insight-card.amber h3{color:#6a4717}
    .insight-card p{margin:0;font-size:.97rem}
    /* ── Notice ── */
    .notice{background:var(--soft-amber);border:1px solid rgba(182,120,31,.22);
      border-radius:18px;padding:18px 20px;margin-bottom:22px;
      font-size:.97rem;color:#4b3a20}
    /* ── Dossier content ── */
    .content{background:white;border:1px solid var(--line);border-radius:var(--radius);
      padding:36px;box-shadow:0 14px 32px rgba(28,36,50,.07)}
    .content h2{font-size:1.7rem;color:var(--blue-dark);margin:0 0 16px;
      padding-bottom:12px;border-bottom:2px solid var(--line);scroll-margin-top:80px}
    .content h3{font-size:1.2rem;color:#233040;margin:24px 0 10px}
    .content p{margin:0 0 14px;color:#2d3a46}
    .content ul{padding-inline-start:22px;margin:0 0 14px}
    .content li{margin-bottom:7px;color:#2d3a46}
    .content table{width:100%;border-collapse:collapse;margin:18px 0;
      border-radius:14px;overflow:hidden;border:1px solid var(--line)}
    .content th{background:var(--soft-blue);padding:13px 14px;
      font-weight:800;color:var(--blue-dark);text-align:right;border-bottom:1px solid var(--line)}
    .content td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
    .content tr:last-child td{border-bottom:none}
    .content tr:nth-child(even) td{background:#fafaf8}
    .content .section-label{display:inline-flex;padding:5px 12px;background:var(--soft-blue);
      color:var(--blue-dark);border-radius:999px;font-size:.87rem;font-weight:700;margin-bottom:12px}
    .content hr{border:none;border-top:1px solid var(--line);margin:28px 0}
    .footer{margin-top:24px;padding:18px 22px;color:var(--muted);text-align:center;
      font-size:.9rem;background:white;border-radius:16px;border:1px solid var(--line)}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    a.btn{display:inline-flex;align-items:center;padding:10px 18px;border-radius:14px;
      color:white;background:var(--blue);text-decoration:none;font-weight:700;font-size:.95rem}
    @media(max-width:820px){
      .wrapper{grid-template-columns:1fr}
      .sidebar{position:static}
      .insights{grid-template-columns:1fr}
      .content{padding:24px 20px}
    }
  </style>
</head>
<body>
<div id="loading">טוען תיק עובדתי...</div>
<script>
(async () => {
  const raw    = location.search.slice(1);
  const digits = raw.replace(/^[a-zA-Z]+/, '');
  const prefix = raw.replace(/\d+$/, '');
  if (!digits) { document.getElementById('loading').textContent = 'קוד מועמד חסר בכתובת'; return; }

  let d, contentHtml;
  try {
    const res = await fetch('101.json');
    if (!res.ok) throw new Error(res.status);
    const all = await res.json();
    d = all[digits];
    if (!d) throw new Error(`קוד ${digits} לא נמצא`);
    contentHtml = d.dossier_html;
  } catch(e) {
    document.getElementById('loading').textContent = 'שגיאה: ' + e.message;
    return;
  }

  const introUrl  = `100.html?${prefix}${d.page_codes.intro}`;
  const scoresUrl = `102.html?${prefix}${d.page_codes.scores}`;

  document.title = `ד.ב.ר — דיוקן המועמד/ת | ${d.name}`;

  const metaFields = [
    ['שם המועמד/ת',           d.name],
    ['מקור גולמי',            'פרפלקסיטי'],
    ['מנוע איסוף',            'sonar-pro'],
    ['תאריך תיק גולמי',       d.dossier_date],
    ['עורך בכיר',             'ג\'מיני'],
    ['מידע חדש נוסף',         d.dossier_new_info || 'לא'],
    ['מטרת המסמך',            'דיוקן המועמד/ת'],
  ];
  const metaHtml = metaFields.map(([l,v]) =>
    `<div class="meta-card"><span>${l}</span><strong>${v}</strong></div>`
  ).join('');

  document.getElementById('loading').outerHTML = `
<header class="topbar">
  <a class="brand" href="dbr_P_01_index.html">
    <span class="brand-mark">ד.ב.ר</span>
    <span>דמוקרטים בוחרים רציונלית</span>
  </a>
  <a class="back-arrow" href="#" onclick="history.back();return false" title="חזרה לדף הקודם">←</a>
</header>
<div class="wrapper">
  <aside class="sidebar">
    <details class="meta-fold">
      <summary class="meta-sum">
        <span class="meta-title">תיק מס' ${d.page_codes.dossier}</span>
        <span class="btn-disabled" title="הדף עדיין בעריכה — בקרוב" onclick="event.preventDefault();event.stopPropagation()">לדף השיבוץ</span>
      </summary>
      <div class="meta-block">${metaHtml}</div>
      <div class="site-copy">© 2026 Silvertel Online ltd | כל הזכויות שמורות</div>
    </details>
  </aside>
  <main class="main">
    <header class="hero">
      <div class="hero-top">
        <div class="brand-mark">ד.ב.ר</div>
        <span class="stage-badge">דיוקן המועמד/ת</span>
      </div>
      <h1>${d.name} — דיוקן</h1>
      <p class="sub">ד.ב.ר · דמוקרטים בוחרים רציונלית</p>
      <p class="credit">נאסף, נבדק ונערך על ידי פרפלקסיטי · ג'יפיטי · ג'מיני · קלוד — בסיוע של החתום מטה</p>
    </header>

    <div class="insights">
      ${d.insight_core ? `<div class="insight-card blue">
        <h3>ניסיון ופעילות מרכזית</h3>
        <p>${d.insight_core}</p>
      </div>` : ''}
      ${d.insight_experience ? `<div class="insight-card green">
        <h3>ניסיון רלוונטי</h3>
        <p>${d.insight_experience}</p>
      </div>` : ''}
    </div>

    <article class="content">${contentHtml}</article>

    <aside class="caveats">
      <h4>הערות והסתייגויות</h4>
      ${d.insight_missing ? `<p><strong>${d.insight_missing_title || 'תחומים חסרים'}:</strong> ${d.insight_missing}</p>` : ''}
      <p>${d.insight_caution || 'התיק העובדתי אינו סיווג לנבחרות ואינו דירוג; הוא בסיס לשלב הסיווג.'}</p>
    </aside>

    <footer class="footer">
      תאריך עיבוד: ${d.render_date} · מקור: ${d.dossier_source || 'פרפלקסיטי sonar-pro'} ·
      ד.ב.ר — דמוקרטים בוחרים רציונלית
      <div class="signature">אמנון זוסמן</div>
    </footer>
  </main>
</div>`;

  // קיפול סעיפים 8–12 + שער-קוד לצוות על סעיפים 9 ואילך (חל על כל המועמדים)
  (function gateSections(){
    const art = document.querySelector('.content');
    if (!art) return;
    const CODE = '5400';

    // 1. קיפול סעיפים 8–12 כל אחד ל-<details>
    [...art.querySelectorAll('h2, h3')].forEach(h => {
      const m = h.textContent.trim().match(/^(8|9|10|11|12)\./);
      if (!m) return;
      const det = document.createElement('details');
      det.className = 'fold';
      det.dataset.sec = m[1];
      const sum = document.createElement('summary');
      sum.innerHTML = h.innerHTML;
      det.appendChild(sum);
      const moved = [];
      let node = h.nextSibling;
      while (node) {
        if (node.nodeType === 1 && node.tagName === 'H2') break;
        moved.push(node); node = node.nextSibling;
      }
      h.parentNode.insertBefore(det, h);
      moved.forEach(n => det.appendChild(n));
      h.remove();
    });

    // 2. איסוף סעיפים 9+ למיכל נעול מאחורי קוד גישה
    const gated = [...art.querySelectorAll('details.fold')].filter(d => +d.dataset.sec >= 9);
    if (!gated.length) return;

    const box = document.createElement('div');
    box.className = 'gate';
    box.innerHTML = `
      <div class="gate-head">🔒 מידע נוסף <span>(לצוות הפרוייקט בלבד)</span></div>
      <p class="gate-note">החלק הבא (סעיפים 9 ואילך — טענות לבדיקה, מגבלות התיק ולוג עריכה) מיועד לצוות הפרוייקט. להצגה, הזן קוד גישה.</p>
      <div class="gate-form">
        <input type="password" class="gate-input" inputmode="numeric" placeholder="קוד גישה" aria-label="קוד גישה"/>
        <button type="button" class="gate-btn">הצג</button>
      </div>
      <div class="gate-err" hidden>קוד שגוי, נסה שוב.</div>
      <div class="gate-content" hidden></div>`;

    gated[0].parentNode.insertBefore(box, gated[0]);
    const holder = box.querySelector('.gate-content');
    gated.forEach(d => holder.appendChild(d));

    const input = box.querySelector('.gate-input');
    const btn   = box.querySelector('.gate-btn');
    const err   = box.querySelector('.gate-err');
    function tryUnlock(){
      if (input.value.trim() === CODE){
        holder.hidden = false;
        box.querySelector('.gate-form').hidden = true;
        box.querySelector('.gate-note').hidden = true;
        err.hidden = true;
        box.querySelector('.gate-head').innerHTML = '🔓 מידע נוסף <span>(לצוות הפרוייקט בלבד)</span>';
      } else {
        err.hidden = false;
        input.value = '';
        input.focus();
      }
    }
    btn.addEventListener('click', tryUnlock);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  })();

  // Highlight active TOC item on scroll
  const sections = document.querySelectorAll('.content h2[id]');
  const navLinks  = document.querySelectorAll('.nav-block a');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const l = document.querySelector(`.nav-block a[href="#${e.target.id}"]`);
        if (l) l.classList.add('active');
      }
    });
  }, {threshold:.35});
  sections.forEach(s => io.observe(s));
})();
</script>
</body>
</html>
