          profileQuote: "פועלת לקידום חברה משותפת, חיזוק השלטון המקומי וישראל חופשית, שוויונית ודמוקרטית יותר.",
          cvQuote: "בקורות החיים מופיעים תפקידי הנהגה, הקמת ארגונים ופעילות לשוויון, אך ללא הצבה ישירה של הפרדת דת ומדינה כליבת הטקסט.",

          profileQuote: "בזוגיות שלא ברבנות... עו״ד לזכויות אדם ואזרח, ממקימות מערך עוטף העצורים.",

          profileQuote: "הוביל מאבק עיקש ומוצלח מול רשויות המדינה ומשרד הדתות, שהביא להסדרת קבורה זמנית ולהתחייבות למימון העתקת הקברים.",
          cvQuote: "לא שולב עדיין טקסט CV בדוגמה זו; הנתון נשען על טקסט ההצגה באתר.",

      ],
      footer: "הדוח מבוסס על החומר הרשמי שפורסם באתר המועמדים של המפלגה: טקסטי הצגה עצמית וקורות חיים שזוהו דרך אייקון ה־PDF באתר. לפני פרסום ציבורי מומלץ להריץ חילוץ מלא ואחיד לכל המועמדים, כדי לוודא שאין מועמד רלוונטי שלא נכנס לדוגמה."
    };

    const levelByKey = Object.fromEntries(REPORT_DATA.levels.map(l => [l.key, l]));

    function escapeHtml(str){
      return String(str ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
    }

    function levelBadge(key){
      const lvl = levelByKey[key] || levelByKey.light;
      return `<span class="level-badge" title="${escapeHtml(lvl.description)}"><span class="dot ${lvl.css}" aria-hidden="true"></span>${escapeHtml(lvl.label)}</span>`;
    }

    function sourceTags(items){
      return `<div class="source-tags">${items.map(x => `<span>${escapeHtml(x)}</span>`).join('')}</div>`;
    }

    function verbs(items){
      return `<div class="verbs">${items.map(x => `<span>${escapeHtml(x)}</span>`).join('')}</div>`;
    }

    function detailBlock(c){
      const cvLink = c.cvUrl ? `<p><a class="source-link" href="${escapeHtml(c.cvUrl)}" target="_blank" rel="noopener noreferrer">פתיחת קורות חיים רשמיים ↗</a></p>` : '';
      return `
        <div class="details" id="details-${c.rank}">
          <p><strong>משפט מקור מההצגה העצמית:</strong></p>
          <p class="quote">${escapeHtml(c.profileQuote)}</p>
          <p><strong>משפט מקור / הערה מקורות החיים:</strong></p>
          <p class="quote">${escapeHtml(c.cvQuote)}</p>
          ${cvLink}
        </div>`;
    }

    function renderReport(data){
      document.title = `ד.ב.ר — דוח נושאי: ${data.meta.topic}`;
      document.getElementById('hero').innerHTML = `
        <p class="eyebrow">${escapeHtml(data.meta.eyebrow)}</p>
        <h1>${escapeHtml(data.meta.topic)}</h1>
        <p class="subtitle">${escapeHtml(data.meta.subtitle)}</p>
        <div class="hero-meta">
          <span class="pill">מקור: ${escapeHtml(data.meta.officialSourceLabel)}</span>
          <span class="pill">בדיקה: ${escapeHtml(data.meta.lastChecked)}</span>
          <span class="pill">הנושא מוביל · המועמדים תחתיו</span>
        </div>`;

      document.getElementById('reportIntro').innerHTML = `
        <h2>תמונת מצב כללית</h2>
        ${data.intro.map(p => `<p>${escapeHtml(p)}</p>`).join('')}
        <h3>מה רואים בדוגמת הנושא?</h3>
        ${data.analysis.map(p => `<p>${escapeHtml(p)}</p>`).join('')}
        <div class="notice"><strong>הערה:</strong> זהו דף יישום לדוגמה. הנתונים מוטמעים כרגע בתוך הדף, ובהמשך יוזנו מקובץ JSON חיצוני.</div>`;

      document.getElementById('methodBox').innerHTML = `
        <h2>${escapeHtml(data.method.title)}</h2>
        <ul>${data.method.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
        <h3>ביאור עוצמת הופעה</h3>
        <div class="legend">
          ${data.levels.map(l => `<div class="legend-row"><span class="dot ${l.css}" aria-hidden="true"></span><div><strong>${escapeHtml(l.label)}</strong> — ${escapeHtml(l.description)}</div></div>`).join('')}
        </div>
        <h3>פעלי עשייה שנבדקו</h3>
        <div class="verb-cloud">${data.commonVerbs.map(v => `<span class="verb">${escapeHtml(v)}</span>`).join('')}</div>`;

      document.getElementById('tableTitle').textContent = `10 הבולטים בנושא ${data.meta.topic}`;
      document.getElementById('updatedLine').textContent = `${data.meta.status} · עודכן: ${data.meta.lastChecked}`;

      document.getElementById('desktopTable').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>מועמד/ת</th>
              <th>עוצמת הופעה</th>
              <th>עוגני עשייה</th>
              <th>למה נכנס/ה לדוח</th>
              <th>מקור</th>
              <th>משפט מקור</th>
            </tr>
          </thead>
          <tbody>
            ${data.candidates.map(c => `
              <tr>
                <td class="rank">${c.rank}</td>
                <td class="name">${escapeHtml(c.name)}</td>
                <td>${levelBadge(c.level)}</td>
                <td>${verbs(c.actionVerbs)}</td>
                <td class="why">${escapeHtml(c.anchors)}</td>
                <td>${sourceTags(c.sourceTypes)}</td>
                <td>
                  <button class="details-btn" type="button" data-target="details-${c.rank}">הצג מקור</button>
                  ${detailBlock(c)}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      document.getElementById('mobileCards').innerHTML = data.candidates.map(c => `
        <article class="candidate-card">
          <div class="candidate-card-header"><span class="rank">#${c.rank}</span><span class="name">${escapeHtml(c.name)}</span>${levelBadge(c.level)}</div>
          <div class="card-line"><span class="label">עוגני עשייה</span>${verbs(c.actionVerbs)}</div>
          <div class="card-line"><span class="label">למה נכנס/ה לדוח</span>${escapeHtml(c.anchors)}</div>
          <div class="card-line"><span class="label">מקור</span>${sourceTags(c.sourceTypes)}</div>
          <div class="card-line"><span class="label">משפט מקור</span><p class="quote">${escapeHtml(c.profileQuote)}</p></div>
          <div class="card-line"><span class="label">קורות חיים / הערת מקור</span><p class="quote">${escapeHtml(c.cvQuote)}</p>${c.cvUrl ? `<p><a class="source-link" href="${escapeHtml(c.cvUrl)}" target="_blank" rel="noopener noreferrer">פתיחת קורות חיים רשמיים ↗</a></p>` : ''}</div>
        </article>`).join('');

      document.getElementById('footerNote').innerHTML = `
        <h2>מקור ומתודולוגיה</h2>
        <p>${escapeHtml(data.footer)}</p>
        <p>הדוח אינו קובע מומחיות, התאמה או המלצה. הוא מציג את עוצמת ההופעה של הנושא בחומר הרשמי בלבד.</p>
        <div class="actions">
          <a class="btn primary" href="${escapeHtml(data.meta.officialSourceUrl)}" target="_blank" rel="noopener noreferrer">לאתר המועמדים הרשמי ↗</a>
          <button class="btn" type="button" onclick="window.print()">הדפסה / שמירה כ־PDF</button>
        </div>`;

      document.querySelectorAll('.details-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          target.classList.toggle('open');
          btn.textContent = target.classList.contains('open') ? 'הסתר מקור' : 'הצג מקור';
        });
      });
    }

    renderReport(REPORT_DATA);
  </script>
